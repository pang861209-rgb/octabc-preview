<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>페이지를 찾을 수 없습니다 | (주)동양케미칼테크</title>
<link rel="icon" type="image/png" href="/images/favicon.png" />
<meta name="theme-color" content="#0a2230" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0a2230; --aqua:#10a98e; --aqua-deep:#0c7d68; --aqua-tint:#e7f4f1;
    --paper:#fbfaf7; --muted:#5d6f78; --line:rgba(10,34,48,.12);
    --sans:"Noto Sans KR", system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;word-break:keep-all}
  .e404{text-align:center;max-width:520px}
  .emblem{width:64px;height:64px;margin:0 auto 26px;display:grid;place-items:center;background:var(--aqua-tint);border:2px solid var(--aqua);transform:rotate(45deg);border-radius:14px}
  .emblem b{transform:rotate(-45deg);color:var(--aqua-deep);font-weight:900;font-size:1.05rem;letter-spacing:.02em}
  .code{font-size:4.4rem;font-weight:900;line-height:1;color:var(--ink);letter-spacing:-.02em}
  h1{font-size:1.3rem;font-weight:700;margin:14px 0 10px}
  p{color:var(--muted);font-size:1rem;line-height:1.7;margin-bottom:28px}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;text-decoration:none;font-weight:700;font-size:.95rem;padding:13px 24px;border-radius:999px;transition:transform .15s,box-shadow .15s}
  .btn-primary{background:var(--aqua);color:#fff;box-shadow:0 14px 30px -14px rgba(16,169,142,.9)}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{border:1.5px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--aqua);color:var(--aqua-deep)}
  .tel{margin-top:26px;font-size:.9rem;color:var(--muted)}
  .tel a{color:var(--aqua-deep);font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <div class="e404">
    <div class="emblem"><b>OCT</b></div>
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 이동되었거나 존재하지 않습니다.<br />아래 버튼으로 홈 또는 제품 카탈로그로 이동해 주세요.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">홈으로 가기</a>
      <a class="btn btn-ghost" href="/products.html">제품 카탈로그</a>
    </div>
    <div class="tel">문의 전화 <a href="tel:051-973-5222">051-973-5222</a></div>
  </div>
</body>
</html>
